# enable auto sleep to save battery
CONFIG_ZMK_SLEEP=n

# enable mouse buttons
CONFIG_ZMK_POINTING=y

# enable nice!view display status widgets
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WPM=y

# increase bluetooth signal power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# enable passkey entry
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# enable soft off
CONFIG_ZMK_PM_SOFT_OFF=y

# updated max combos per key
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=16

# improve Windows BT connection with nRF52 2 Mbps PHY
CONFIG_BT_CTLR_PHY_2M=n
