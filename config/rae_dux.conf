# Rae-Dux Configuration for ZMK with Zephyr 3.5+
# Updated for latest upstream Miryoku ZMK compatibility

# Battery and power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000  # 30 minutes
CONFIG_ZMK_PM_SOFT_OFF=y

# Bluetooth configuration
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Mouse and pointer support (now built into upstream)
CONFIG_ZMK_POINTING=y

# Combo configuration for row combos and thumb combos
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=16
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=4

# Debounce settings for better reliability
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# USB logging (disable for production, enable for debugging)
# CONFIG_ZMK_USB_LOGGING=y

# Display support (if using nice!view - uncomment if needed)
# CONFIG_ZMK_DISPLAY=y
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Encoder support (if using rotary encoders - uncomment if needed)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
